services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: splash-frontend
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: development
      PORT: 3010
      # URL of the Quint API. On a host running Quint locally, use
      # http://host.docker.internal:8888 (macOS/Windows) or the host IP on Linux.
      NEXT_PUBLIC_QUINT_HOST: ${NEXT_PUBLIC_QUINT_HOST:-http://host.docker.internal:8888}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
